[global]
type=global
endpoint_identifier_order=username,ip,anonymous

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0

[1001]
type=endpoint
context=default
disallow=all
allow=ulaw
allow=alaw
auth=auth1001
aors=1001

[auth1001]
type=auth
auth_type=userpass
password=1001
username=1001

[1001]
type=aor
max_contacts=5
remove_existing=yes

